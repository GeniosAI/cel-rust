name: Pull Request Check

# Upstream's DCO (Developer Certificate of Origin) sign-off check. Not needed for
# our internal fork, so it's kept manual-only (workflow_dispatch) rather than
# running on every PR. Restore the `pull_request:` trigger if we ever want to
# enforce Signed-off-by on contributions again.
on:
  workflow_dispatch:

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: KineticCafe/actions-dco@v3
